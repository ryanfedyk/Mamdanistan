# Deploys the live site whenever main updates (i.e. when a PR is merged).
name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main
  # Allows a live deploy to be triggered by hand from the Actions tab / API,
  # independent of a push (useful for the first deploy and for re-deploys).
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MAMDANISTAN }}
          channelId: live
          projectId: mamdanistan
