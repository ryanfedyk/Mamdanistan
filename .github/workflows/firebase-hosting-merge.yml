# Deploys the live site whenever main updates (i.e. when a PR is merged).
name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main
  # Allows a live deploy to be triggered by hand from the Actions tab / API,
  # independent of a push (useful for the first deploy and for re-deploys).
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # Deploy via the CLI directly (not action-hosting-deploy@v0) so we can
      # treat a no-op release as success. Firebase returns FAILED_PRECONDITION
      # ("supplied version is the current active version") in two harmless
      # cases the action surfaces as failures: (1) the rebuilt site is identical
      # to what's already live (e.g. a workflow-only change), and (2) a
      # "premature close" causes firebase-tools to retry an already-successful
      # release. Both mean the site is up to date, so we exit 0 for them only.
      - name: Deploy to Firebase Hosting (live)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MAMDANISTAN }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          set +e
          out=$(npx -y firebase-tools@latest deploy --only hosting \
            --project mamdanistan --non-interactive 2>&1)
          code=$?
          printf '%s\n' "$out"
          if [ $code -ne 0 ] && printf '%s' "$out" | grep -q "is the current active version"; then
            echo "::notice::Hosting content already live (no-op release) — treating as success."
            exit 0
          fi
          exit $code
